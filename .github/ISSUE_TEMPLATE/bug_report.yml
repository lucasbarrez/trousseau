name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, what you expected, and what you saw instead.
      placeholder: I uploaded a HEIC photo on the cover step and the generated PDF had no photo.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Go to the Cover step
        2. Upload a HEIC file
        3. Go to the Preview step and click Generate
        4. Open the downloaded PDF — no photo on the cover
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit, tag, or Docker image tag (`ghcr.io/.../trousseau:vX.Y.Z`)
      placeholder: v0.1.0
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Firefox 142 on macOS / Chrome 130 on Windows
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Browser console output
      description: Any errors or warnings in the devtools console (F12 → Console).
      render: shell
