version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # ESLint 10 has no compatible eslint-config-next yet; wait for upstream.
      - dependency-name: eslint
        update-types: [version-update:semver-major]
      # TypeScript majors are picked up via @types groups — let them rollup.
      - dependency-name: typescript
        update-types: [version-update:semver-major]
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
          - "radix-ui"
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
      types:
        patterns:
          - "@types/*"
      eslint:
        patterns:
          - "eslint*"
      next:
        patterns:
          - "next"
          - "eslint-config-next"
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    ignore:
      # Stay on the Active LTS line for Node — current (odd) releases aren't
      # supported long enough for a self-hosted project to follow.
      - dependency-name: node
        update-types: [version-update:semver-major]
    commit-message:
      prefix: build
      include: scope
