version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
          - "radix-ui"
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
      types:
        patterns:
          - "@types/*"
      eslint:
        patterns:
          - "eslint*"
      next:
        patterns:
          - "next"
          - "eslint-config-next"
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: build
      include: scope
