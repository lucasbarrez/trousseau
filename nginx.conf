worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # Logs to stdout/stderr so docker logs picks them up
  access_log /dev/stdout;

  # Use writable temp paths since we run as non-root
  client_body_temp_path /tmp/client_body;
  proxy_temp_path /tmp/proxy;
  fastcgi_temp_path /tmp/fastcgi;
  uwsgi_temp_path /tmp/uwsgi;
  scgi_temp_path /tmp/scgi;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff font/woff2;

  server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed Next.js assets
    location /_next/static/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Don't cache HTML — releases swap these files
    location ~* \.html$ {
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA-style fallback: try the file, then a sibling .html, then index.html
    location / {
      try_files $uri $uri.html $uri/index.html /index.html;
    }
  }
}
