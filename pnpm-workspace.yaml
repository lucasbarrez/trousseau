# sharp is pulled in by Next.js for next/image runtime optimization.
# Static export never calls it, so we skip the install entirely (saves ~30 MB).
ignoredOptionalDependencies:
  - sharp

minimumReleaseAgeExclude:
  - '@next/env@16.2.9'
  - '@next/eslint-plugin-next@16.2.9'
  - '@next/swc-darwin-arm64@16.2.9'
  - '@next/swc-darwin-x64@16.2.9'
  - '@next/swc-linux-arm64-gnu@16.2.9'
  - '@next/swc-linux-arm64-musl@16.2.9'
  - '@next/swc-linux-x64-gnu@16.2.9'
  - '@next/swc-linux-x64-musl@16.2.9'
  - '@next/swc-win32-arm64-msvc@16.2.9'
  - '@next/swc-win32-x64-msvc@16.2.9'
  - eslint-config-next@16.2.9
  - next@16.2.9

# unrs-resolver is a hard transitive dep of eslint-config-next.
# Listing it here lets pnpm build its native binary without warnings in dev.
# CI/Docker still pass --ignore-scripts since neither runs lint at install time.
onlyBuiltDependencies:
  - unrs-resolver
